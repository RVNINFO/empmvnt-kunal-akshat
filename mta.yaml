_schema-version: 3.3.0
ID: syq_hr_mif
description: A simple CAP project.
version: 1.0.0
modules:
  - name: syq_hr_mif-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: syq_hr_mif-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: syq_hr_mif-destination-content
    type: com.sap.application.content
    requires:
      - name: syq_hr_mif-destination-service
        parameters:
          content-target: true
      - name: syq_hr_move_init_form_backend_html_repo_host
        parameters:
          service-key:
            name: syq_hr_move_init_form_backend_html_repo_host-key
      - name: syq_hr_mif-auth
        parameters:
          service-key:
            name: syq_hr_mif-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: empglobalmobily_syq_hr_move_init_form_backend_html_repo_host
              ServiceInstanceName: syq_hr_mif-html5-app-host-service
              ServiceKeyName: syq_hr_move_init_form_backend_html_repo_host-key
              sap.cloud.service: empglobalmobily
            - Authentication: OAuth2UserTokenExchange
              Name: empglobalmobily_syq_hr_move_init_form_backend_auth
              ServiceInstanceName: syq_hr_mif-auth
              ServiceKeyName: syq_hr_mif-auth-key
              sap.cloud.service: empglobalmobily
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: syq_hr_mif-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: syq_hr_move_init_form_backend_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - comsyensqohrempmovementform.zip
          name: comsyensqohrempmovementform
          target-path: resources/
  - name: comsyensqohrempmovementform
    type: html5
    path: app/empmovementform
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []
resources:
  - name: syq_hr_mif-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: syq_hr_mif
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: syq_hr_mif-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: syq_hr_mif-destination-service
      service-plan: lite
    requires:
      - name: srv-api
  - name: syq_hr_move_init_form_backend_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: syq_hr_mif-html5-app-host-service
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
